<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>香港租金回報計算器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0a0b;
    --bg-secondary: #111113;
    --bg-card: #16161a;
    --bg-card-hover: #1c1c21;
    --bg-input: #0f0f11;
    --border: #2a2a30;
    --border-light: #3a3a42;
    --gold: #c9a962;
    --gold-light: #e4c87a;
    --gold-dim: #8a7444;
    --gold-glow: rgba(201, 169, 98, 0.15);
    --text-primary: #f5f5f3;
    --text-secondary: #9a9a9e;
    --text-dim: #5a5a5e;
    --green: #4ade80;
    --green-dim: rgba(74, 222, 128, 0.15);
    --red: #f87171;
    --red-dim: rgba(248, 113, 113, 0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html {
    height: 100%;
    -webkit-text-size-adjust: 100%;
  }
  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100%;
    height: auto;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 0 12px 24px;
  }

  /* Header - compact */
  .header {
    padding: 16px 0 12px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }
  .logo {
    font-size: 18px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.02em;
    margin-bottom: 4px;
  }
  .subtitle {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* Card - compact */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 10px;
  }
  .card.gold {
    border-color: var(--gold-dim);
  }

  /* Section Title */
  .section-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  /* Input Group */
  .input-group {
    margin-bottom: 8px;
  }
  .input-group:last-child {
    margin-bottom: 0;
  }
  .input-label {
    display: block;
    font-size: 11px;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }

  /* Number Input */
  .number-input-wrapper {
    display: flex;
    align-items: stretch;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .number-btn {
    width: 36px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .number-btn:hover { color: var(--gold); background: var(--bg-card-hover); }
  .number-btn.minus { border-right: 1px solid var(--border); }
  .number-btn.plus { border-left: 1px solid var(--border); }
  .number-input {
    flex: 1;
    background: transparent;
    border: none;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--text-primary);
    padding: 8px 4px;
    min-width: 0;
  }
  .number-input:focus { outline: none; }
  .number-input::-webkit-inner-spin-button,
  .number-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  .number-input { -moz-appearance: textfield; }

  /* Select */
  .select-wrapper {
    position: relative;
  }
  .select-input {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 32px 8px 10px;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    color: var(--text-primary);
    cursor: pointer;
    appearance: none;
  }
  .select-input:focus { outline: none; border-color: var(--gold-dim); }
  .select-arrow {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    color: var(--text-dim);
  }

  /* Grid layouts */
  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
  }

  /* Toggle Button */
  .toggle-chart-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-secondary);
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    cursor: pointer;
  }
  .toggle-chart-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

  /* Calculate Button */
  .calc-btn {
    width: 100%;
    padding: 14px;
    margin: 8px 0;
    background: linear-gradient(135deg, var(--gold-dim) 0%, var(--gold) 100%);
    border: none;
    border-radius: 10px;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: #0a0a0b;
    cursor: pointer;
  }
  .calc-btn:hover { box-shadow: 0 4px 16px rgba(201, 169, 98, 0.3); }

  /* Results */
  .result-card {
    background: linear-gradient(135deg, var(--bg-card) 0%, rgba(201, 169, 98, 0.05) 100%);
    border: 1px solid var(--gold-dim);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .result-header {
    text-align: center;
    margin-bottom: 12px;
  }
  .result-title {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .result-main {
    font-size: 24px;
    font-weight: 600;
    color: var(--gold);
  }
  .result-main.positive { color: var(--green); }
  .result-main.negative { color: var(--red); }

  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }
  .result-item {
    background: var(--bg-primary);
    border-radius: 8px;
    padding: 10px;
    text-align: center;
  }
  .result-item-label {
    font-size: 10px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .result-item-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text-primary);
  }

  .cash-return-badge {
    display: inline-block;
    padding: 6px 12px;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-bottom: 10px;
  }
  .cash-return-badge.positive { background: var(--green-dim); color: var(--green); }
  .cash-return-badge.negative { background: var(--red-dim); color: var(--red); }

  .payback-box {
    text-align: center;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .payback-label { font-size: 10px; color: var(--text-dim); }
  .payback-value { font-size: 20px; font-weight: 600; color: var(--gold-light); }
  .payback-value.bad { color: var(--red); }
  .payback-sub { font-size: 10px; color: var(--text-dim); }

  /* Detail Results */
  .detail-section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 10px;
  }
  .detail-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 8px;
  }
  .detail-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-label { font-size: 11px; color: var(--text-secondary); }
  .detail-value { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-primary); }
  .detail-value.highlight { color: var(--gold); }
  .detail-value.green { color: var(--green); }
  .detail-value.red { color: var(--red); }

  /* One-time expenses */
  .expense-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }
  .expense-item {
    background: var(--bg-primary);
    border-radius: 8px;
    padding: 8px 4px;
    text-align: center;
  }
  .expense-label { font-size: 9px; color: var(--text-dim); margin-bottom: 4px; }
  .expense-value { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--gold); word-break: break-all; }
  .expense-item .number-input-wrapper { margin-top: 4px; }
  .expense-item .number-input { font-size: 10px; padding: 4px 2px; }

  /* Chart Section */
  .chart-section { display: none; }
  .chart-section.visible { display: block; }
  .chart-container {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 10px;
  }
  .chart-header { text-align: center; margin-bottom: 10px; }
  .chart-title { font-size: 12px; font-weight: 600; color: var(--text-primary); }
  .chart-subtitle { font-size: 10px; color: var(--text-dim); }

  .slider-container { margin: 10px 0; }
  .slider-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .slider-value { color: var(--gold) !important; font-weight: 500; }
  .slider {
    width: 100%;
    height: 4px;
    border-radius: 2px;
    background: var(--bg-input);
    -webkit-appearance: none;
  }
  .slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--gold);
    cursor: pointer;
  }

  .optimal-box {
    margin-top: 10px;
    padding: 10px;
    background: rgba(201, 169, 98, 0.1);
    border: 1px solid var(--gold-dim);
    border-radius: 8px;
    text-align: center;
  }
  .optimal-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; }
  .optimal-value { font-size: 16px; font-weight: 600; color: var(--gold); }

  #analysisChart { max-height: 160px; }

  /* Chart card price display */
  .chart-price-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 10px;
  }
  .chart-price-item {
    background: var(--bg-primary);
    border-radius: 8px;
    padding: 8px;
    text-align: center;
  }
  .chart-price-label { font-size: 9px; color: var(--text-dim); }
  .chart-price-value { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--gold); }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <header class="header">
    <div class="logo">租金回報計算器</div>
    <div class="subtitle">Hong Kong Property Investment</div>
  </header>

  <!-- Chart Toggle -->
  <button class="toggle-chart-btn" id="chartToggle" onclick="toggleChart()">
    <span>📊</span> 圖表分析
  </button>

  <!-- Chart Section -->
  <div class="chart-section" id="chartSection">
    <div class="chart-container">
      <div class="chart-header">
        <div class="chart-title">最佳按揭比例分析</div>
        <div class="chart-subtitle">移動 Slider 實時更新</div>
      </div>

      <div class="slider-container">
        <div class="slider-labels">
          <span>首期: <span class="slider-value" id="ratioDisplay">20</span>%</span>
          <span>按揭: <span class="slider-value" id="loanDisplay">80</span>%</span>
        </div>
        <input type="range" class="slider" id="downRatio" min="10" max="90" value="20" oninput="syncDownFromSlider()">
      </div>

      <div class="chart-price-grid">
        <div class="chart-price-item">
          <div class="chart-price-label">樓價</div>
          <div class="chart-price-value" id="chartPrice">$5,000,000</div>
        </div>
        <div class="chart-price-item">
          <div class="chart-price-label">首期</div>
          <div class="chart-price-value" id="chartDown">$1,000,000</div>
        </div>
      </div>

      <canvas id="analysisChart"></canvas>

      <div class="optimal-box">
        <div class="optimal-label">最佳回報</div>
        <div class="optimal-value">首期 <span id="optimalDown">30</span>% = <span id="optimalReturn">5.2</span>%</div>
      </div>
    </div>
  </div>

  <!-- Property Price -->
  <div class="card">
    <div class="section-title">樓價</div>
    <div class="input-group">
      <div class="input-label">樓價 (HK$)</div>
      <div class="number-input-wrapper">
        <button class="number-btn minus" onclick="adjustValue('price', -100000)">−</button>
        <input type="number" class="number-input" id="price" value="5000000" inputmode="decimal" oninput="syncDownFromInput()">
        <button class="number-btn plus" onclick="adjustValue('price', 100000)">+</button>
      </div>
    </div>
  </div>

  <!-- Down Payment & Rate -->
  <div class="card">
    <div class="section-title">按揭資料</div>
    <div class="grid-2">
      <div class="input-group">
        <div class="input-label">首期 (HK$)</div>
        <div class="number-input-wrapper">
          <button class="number-btn minus" onclick="adjustValue('down', -100000)">−</button>
          <input type="number" class="number-input" id="down" value="1000000" inputmode="decimal" oninput="syncDownFromInput()">
          <button class="number-btn plus" onclick="adjustValue('down', 100000)">+</button>
        </div>
      </div>
      <div class="input-group">
        <div class="input-label">按揭利率 (%)</div>
        <div class="number-input-wrapper">
          <button class="number-btn minus" onclick="adjustRate(-0.25)">−</button>
          <input type="number" class="number-input" id="rate" value="3" step="0.01" inputmode="decimal">
          <button class="number-btn plus" onclick="adjustRate(0.25)">+</button>
        </div>
      </div>
    </div>
    <div class="input-group" style="margin-top: 8px;">
      <div class="input-label">還款年期</div>
      <div class="select-wrapper">
        <select class="select-input" id="years">
          <option value="10">10 年</option>
          <option value="15">15 年</option>
          <option value="20">20 年</option>
          <option value="25">25 年</option>
          <option value="30" selected>30 年</option>
        </select>
        <span class="select-arrow">▼</span>
      </div>
    </div>
  </div>

  <!-- Rent & Lease -->
  <div class="card">
    <div class="section-title">租金收入</div>
    <div class="grid-2">
      <div class="input-group">
        <div class="input-label">每月租金 (HK$)</div>
        <div class="number-input-wrapper">
          <button class="number-btn minus" onclick="adjustValue('rent', -500)">−</button>
          <input type="number" class="number-input" id="rent" value="18000" inputmode="decimal">
          <button class="number-btn plus" onclick="adjustValue('rent', 500)">+</button>
        </div>
      </div>
      <div class="input-group">
        <div class="input-label">租約年期</div>
        <div class="select-wrapper">
          <select class="select-input" id="leaseYears" onchange="updateLeaseType()">
            <option value="1">1 年</option>
            <option value="2">2 年</option>
            <option value="3" selected>3 年</option>
            <option value="4">4 年</option>
            <option value="5">5 年</option>
            <option value="0">自住</option>
          </select>
          <span class="select-arrow">▼</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Expenses -->
  <div class="card">
    <div class="section-title">固定支出</div>
    <div class="grid-2">
      <div class="input-group">
        <div class="input-label">年差餉 (HK$)</div>
        <div class="number-input-wrapper">
          <input type="number" class="number-input" id="rates" value="0" inputmode="decimal" placeholder="auto">
        </div>
      </div>
      <div class="input-group">
        <div class="input-label">年地租 (HK$)</div>
        <div class="number-input-wrapper">
          <input type="number" class="number-input" id="govrent" value="0" inputmode="decimal" placeholder="auto">
        </div>
      </div>
    </div>
    <div class="input-group" style="margin-top: 8px;">
      <div class="input-label">月管理費 (HK$)</div>
      <div class="number-input-wrapper">
        <button class="number-btn minus" onclick="adjustValue('mgmt', -100)">−</button>
        <input type="number" class="number-input" id="mgmt" value="1500" inputmode="decimal">
        <button class="number-btn plus" onclick="adjustValue('mgmt', 100)">+</button>
      </div>
    </div>
  </div>

  <!-- One-time Expenses -->
  <div class="card gold">
    <div class="section-title">買樓一次性支出</div>
    <div class="expense-grid">
      <div class="expense-item">
        <div class="expense-label">印花稅</div>
        <div class="expense-value" id="buyStampDuty">$100</div>
      </div>
      <div class="expense-item">
        <div class="expense-label">律師費</div>
        <div class="number-input-wrapper">
          <input type="number" class="number-input" id="lawyerFee" value="10000" inputmode="decimal">
        </div>
      </div>
      <div class="expense-item">
        <div class="expense-label">經紀費</div>
        <div class="number-input-wrapper">
          <input type="number" class="number-input" id="agentFee" value="0" inputmode="decimal" placeholder="auto">
        </div>
      </div>
    </div>
  </div>

  <!-- Calculate Button -->
  <button class="calc-btn" onclick="calc()">
    重新計算
  </button>

  <!-- Results -->
  <div id="result"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
let chartInstance = null;
let showChart = false;

function toggleChart() {
  showChart = !showChart;
  document.getElementById('chartSection').classList.toggle('visible', showChart);
  if (showChart) { initChart(); updateChart(); }
}

function syncDownFromSlider() {
  let price = parseFloat(document.getElementById('price').value) || 0;
  let ratio = parseFloat(document.getElementById('downRatio').value) || 20;
  document.getElementById('down').value = Math.round(price * (ratio / 100));
  updateChart(); calc();
}

function syncDownFromInput() {
  let price = parseFloat(document.getElementById('price').value) || 0;
  let down = parseFloat(document.getElementById('down').value) || 0;
  if (price > 0) {
    let ratio = Math.max(10, Math.min(90, (down / price) * 100));
    document.getElementById('downRatio').value = ratio.toFixed(0);
    document.getElementById('ratioDisplay').textContent = ratio.toFixed(0);
    document.getElementById('loanDisplay').textContent = (100 - ratio).toFixed(0);
  }
  if (showChart) updateChart();
  calc();
}

function adjustRate(delta) {
  const rateInput = document.getElementById('rate');
  let rate = parseFloat(rateInput.value) || 0;
  rate = Math.round((rate + delta) * 100) / 100;
  if (rate < 0) rate = 0;
  rateInput.value = rate;
  calc();
  if (showChart) updateChart();
}

function adjustValue(id, delta) {
  const input = document.getElementById(id);
  let value = Math.max(0, (parseFloat(input.value) || 0) + delta);
  input.value = value;
  if (id === 'down') syncDownFromInput();
  else { if (showChart) updateChart(); calc(); }
}

function updateLeaseType() {
  let isSelfLive = document.getElementById('leaseYears').value === '0';
  const rentInput = document.getElementById('rent');
  rentInput.value = isSelfLive ? 0 : rentInput.value;
  rentInput.disabled = isSelfLive;
  calc();
}

function formatMoney(num) { return '$' + Math.round(num).toLocaleString(); }

function calc() {
  let price = parseFloat(document.getElementById('price').value) || 0;
  let down = parseFloat(document.getElementById('down').value) || 0;
  let loan = price - down;

  function calcBuyStampDuty(p) {
    if (p <= 4000000) return 100;
    if (p <= 4323780) return 100 + (p - 4000000) * 0.20;
    if (p <= 4500000) return p * 0.015;
    if (p <= 4935480) return 67500 + (p - 4500000) * 0.10;
    if (p <= 6000000) return p * 0.0225;
    if (p <= 6642860) return 135000 + (p - 6000000) * 0.10;
    if (p <= 9000000) return p * 0.03;
    if (p <= 10080000) return 270000 + (p - 9000000) * 0.10;
    if (p <= 20000000) return p * 0.0375;
    if (p <= 21739120) return 750000 + (p - 20000000) * 0.10;
    if (p <= 100000000) return p * 0.0425;
    if (p <= 109574470) return 4250000 + (p - 100000000) * 0.30;
    return p * 0.065;
  }

  let buyStampDuty = calcBuyStampDuty(price);
  let lawyerFee = parseFloat(document.getElementById('lawyerFee').value) || 10000;
  let agentFeeInput = parseFloat(document.getElementById('agentFee').value);
  let agentFee = !isNaN(agentFeeInput) && agentFeeInput > 0 ? agentFeeInput : price * 0.015;

  document.getElementById('buyStampDuty').textContent = formatMoney(Math.round(buyStampDuty));

  let totalOneTime = buyStampDuty + lawyerFee + agentFee;
  let r = parseFloat(document.getElementById('rate').value)/100/12 || 0;
  let n = parseFloat(document.getElementById('years').value)*12 || 0;
  let pmt = (r === 0 || n === 0) ? 0 : loan * r * Math.pow(1+r,n) / (Math.pow(1+r,n)-1);

  let monthlyRent = parseFloat(document.getElementById('rent').value) || 0;
  let annualRent = monthlyRent * 12;
  let leaseYears = parseFloat(document.getElementById('leaseYears').value) ?? 1;
  let isSelfOccupied = leaseYears === 0;

  let stampDutyRate = isSelfOccupied ? 0 : (leaseYears <= 1 ? 0.0025 : (leaseYears <= 3 ? 0.005 : 0.01));
  let stampDuty = isSelfOccupied ? 0 : (annualRent * leaseYears * stampDutyRate);

  let inputRates = parseFloat(document.getElementById('rates').value) || 0;
  let annualRates = inputRates > 0 ? inputRates : annualRent * 0.05;

  let inputGov = parseFloat(document.getElementById('govrent').value) || 0;
  let annualGovRent = inputGov > 0 ? inputGov : annualRent * 0.03;

  let monthlyMgmt = parseFloat(document.getElementById('mgmt').value) || 0;
  let annualMgmt = monthlyMgmt * 12;

  let assessable = annualRent - annualRates;
  let nav = assessable * 0.8;
  let tax = isSelfOccupied ? 0 : Math.max(nav * 0.15, 0);

  let netAnnualCash = annualRent - annualRates - annualGovRent - annualMgmt - tax - (pmt * 12);
  let netMonthlyCash = netAnnualCash / 12;

  let paybackMonths = netMonthlyCash > 0 ? Math.ceil(totalOneTime / netMonthlyCash) : 999;
  let paybackYears = paybackMonths < 999 ? (paybackMonths / 12).toFixed(1) : '∞';

  let cashReturn = down > 0 ? (netAnnualCash / down * 100).toFixed(2) : 0;
  let grossYield = price > 0 ? (annualRent / price * 100).toFixed(2) : 0;

  let isAutoR = inputRates <= 0 ? "（自動）" : "";
  let isAutoG = inputGov <= 0 ? "（自動）" : "";

  let cashClass = netAnnualCash >= 0 ? 'positive' : 'negative';
  let paybackClass = paybackMonths < 120 ? 'bad' : 'bad';

  document.getElementById('result').innerHTML = `
    <div class="result-card">
      <div class="result-header">
        <div class="result-title">年淨現金流</div>
        <div class="result-main ${cashClass}">${formatMoney(Math.round(netAnnualCash))}</div>
      </div>
      <div class="result-grid">
        <div class="result-item">
          <div class="result-item-label">月淨現金流</div>
          <div class="result-item-value">${formatMoney(Math.round(netMonthlyCash))}</div>
        </div>
        <div class="result-item">
          <div class="result-item-label">毛租金回報</div>
          <div class="result-item-value">${grossYield}%</div>
        </div>
      </div>
      <div style="text-align:center">
        <div class="cash-return-badge ${cashClass}">現金回報率：${cashReturn}%</div>
      </div>
      <div class="payback-box">
        <div class="payback-label">回本期</div>
        <div class="payback-value ${paybackClass}">${paybackMonths < 999 ? paybackMonths + ' 個月' : '無法回本'}</div>
        <div class="payback-sub">(${paybackYears} 年)</div>
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-title">樓價資料</div>
      <div class="detail-row"><span class="detail-label">樓價</span><span class="detail-value">${formatMoney(price)}</span></div>
      <div class="detail-row"><span class="detail-label">首期</span><span class="detail-value">${formatMoney(down)}</span></div>
      <div class="detail-row"><span class="detail-label">按揭金額</span><span class="detail-value">${formatMoney(loan)}</span></div>
      <div class="detail-row"><span class="detail-label">月供款</span><span class="detail-value">${formatMoney(Math.round(pmt))}</span></div>
      <div class="detail-row"><span class="detail-label">年供款</span><span class="detail-value">${formatMoney(Math.round(pmt * 12))}</span></div>
    </div>

    <div class="detail-section">
      <div class="detail-title">一次性支出</div>
      <div class="detail-row"><span class="detail-label">印花稅</span><span class="detail-value highlight">${formatMoney(Math.round(buyStampDuty))}</span></div>
      <div class="detail-row"><span class="detail-label">律師費</span><span class="detail-value">${formatMoney(lawyerFee)}</span></div>
      <div class="detail-row"><span class="detail-label">經紀費</span><span class="detail-value">${formatMoney(Math.round(agentFee))}</span></div>
      <div class="detail-row"><span class="detail-label">租客釐印費</span><span class="detail-value">${formatMoney(Math.round(stampDuty))}</span></div>
      <div class="detail-row"><span class="detail-label">總額</span><span class="detail-value highlight">${formatMoney(Math.round(totalOneTime + stampDuty))}</span></div>
    </div>

    <div class="detail-section">
      <div class="detail-title">租金收入</div>
      <div class="detail-row"><span class="detail-label">月租金</span><span class="detail-value green">${formatMoney(monthlyRent)}</span></div>
      <div class="detail-row"><span class="detail-label">年租金</span><span class="detail-value green">${formatMoney(annualRent)}</span></div>
    </div>

    <div class="detail-section">
      <div class="detail-title">稅務計算</div>
      <div class="detail-row"><span class="detail-label">年物业税</span><span class="detail-value red">${formatMoney(Math.round(tax))}</span></div>
      <div class="detail-row"><span class="detail-label">月物业税</span><span class="detail-value red">${formatMoney(Math.round(tax / 12))}</span></div>
    </div>

    <div class="detail-section">
      <div class="detail-title">支出</div>
      <div class="detail-row"><span class="detail-label">年地租 ${isAutoG}</span><span class="detail-value">${formatMoney(Math.round(annualGovRent))}</span></div>
      <div class="detail-row"><span class="detail-label">月地租</span><span class="detail-value">${formatMoney(Math.round(annualGovRent / 12))}</span></div>
      <div class="detail-row"><span class="detail-label">年差餉 ${isAutoR}</span><span class="detail-value">${formatMoney(Math.round(annualRates))}</span></div>
      <div class="detail-row"><span class="detail-label">月差餉</span><span class="detail-value">${formatMoney(Math.round(annualRates / 12))}</span></div>
      <div class="detail-row"><span class="detail-label">年管理費</span><span class="detail-value">${formatMoney(Math.round(annualMgmt))}</span></div>
      <div class="detail-row"><span class="detail-label">月管理費</span><span class="detail-value">${formatMoney(Math.round(monthlyMgmt))}</span></div>
    </div>
  `;
}

function initChart() {
  const ctx = document.getElementById('analysisChart').getContext('2d');
  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [{
        label: '現金回報率 (%)',
        data: [],
        borderColor: '#c9a962',
        backgroundColor: 'rgba(201, 169, 98, 0.1)',
        fill: true, tension: 0.4,
        pointRadius: 2, pointBackgroundColor: '#c9a962'
      }, {
        label: '月淨現金流',
        data: [],
        borderColor: '#4ade80',
        backgroundColor: 'rgba(74, 222, 128, 0.05)',
        fill: true, tension: 0.4,
        pointRadius: 2, pointBackgroundColor: '#4ade80',
        yAxisID: 'y1'
      }]
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#5a5a5e', font: { family: 'Outfit', size: 9 } } },
        y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#5a5a5e', font: { family: 'Outfit', size: 9 } }, beginAtZero: true },
        y1: { grid: { drawOnChartArea: false }, ticks: { color: '#5a5a5e', font: { family: 'Outfit', size: 9 } }, beginAtZero: true, position: 'right' }
      },
      plugins: {
        legend: { labels: { color: '#9a9a9e', font: { family: 'Outfit', size: 9 }, usePointStyle: true, pointStyle: 'circle' } },
        tooltip: { backgroundColor: '#16161a', titleColor: '#f5f5f3', bodyColor: '#9a9a9e', borderColor: '#2a2a30', borderWidth: 1, padding: 8, cornerRadius: 6 }
      }
    }
  });
}

function updateChart() {
  let price = parseFloat(document.getElementById('price').value) || 0;
  let currentRatio = parseFloat(document.getElementById('downRatio').value) || 20;
  document.getElementById('ratioDisplay').textContent = currentRatio;
  document.getElementById('loanDisplay').textContent = 100 - currentRatio;
  document.getElementById('chartPrice').textContent = formatMoney(price);
  document.getElementById('chartDown').textContent = formatMoney(price * (currentRatio / 100));

  let ratios = [], returns = [], cashflows = [], maxReturn = -999999, optimalRatio = 20, optimalReturn = 0;

  for (let r = 10; r <= 90; r += 5) {
    ratios.push(r + '%');
    let down = price * (r / 100);
    let loan = price - down;
    let rate = parseFloat(document.getElementById('rate').value)/100/12 || 0;
    let n = parseFloat(document.getElementById('years').value)*12 || 0;
    let pmt = (rate === 0 || n === 0) ? 0 : loan * rate * Math.pow(1+rate,n) / (Math.pow(1+rate,n)-1);
    let monthlyRent = parseFloat(document.getElementById('rent').value) || 0;
    let annualRent = monthlyRent * 12;
    let tax = parseFloat(document.getElementById('leaseYears').value) == 0 ? 0 : Math.max((annualRent - annualRent * 0.05) * 0.8 * 0.15, 0);
    let netAnnualCash = annualRent - annualRent * 0.05 - annualRent * 0.03 - (parseFloat(document.getElementById('mgmt').value) || 0) * 12 - tax - (pmt * 12);
    let cashReturn = down > 0 ? (netAnnualCash / down * 100) : 0;
    returns.push(cashReturn);
    cashflows.push(netAnnualCash / 12);
    if (cashReturn > maxReturn) { maxReturn = cashReturn; optimalRatio = r; optimalReturn = cashReturn; }
  }

  if (chartInstance) {
    chartInstance.data.labels = ratios;
    chartInstance.data.datasets[0].data = returns;
    chartInstance.data.datasets[1].data = cashflows;
    chartInstance.update();
  }
  document.getElementById('optimalDown').textContent = optimalRatio;
  document.getElementById('optimalReturn').textContent = optimalReturn.toFixed(2);
}

window.addEventListener('DOMContentLoaded', calc);
document.querySelectorAll('input').forEach(input => {
  input.addEventListener('input', function() { calc(); if (showChart && this.id !== 'down') updateChart(); });
});
document.querySelectorAll('select').forEach(select => {
  select.addEventListener('change', function() { calc(); if (showChart) updateChart(); });
});
</script>
</body>
</html>
